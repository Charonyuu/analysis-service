<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; }
    .login-card h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
    .login-card p { color: #666; margin-bottom: 24px; font-size: 14px; }
    .login-card input { width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
    .login-card input:focus { outline: none; border-color: #4f86f7; box-shadow: 0 0 0 2px rgba(79,134,247,0.2); }
    .login-card button { width: 100%; padding: 12px; background: #4f86f7; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; }
    .login-card button:hover { background: #3a6fd8; }
    .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Analytics Dashboard</h1>
    <p>Please enter your password to continue</p>
    <form method="POST" action="/dashboard/login">
      <div id="error-msg" class="error" style="display:none">Password incorrect</div>
      <input type="password" name="password" placeholder="Enter password" required autofocus>
      <button type="submit">Login</button>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
