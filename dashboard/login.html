<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - Login</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #0f0f10;
      color: #e4e4e7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: #18181b;
      border: 1px solid #27272a;
      padding: 48px 40px;
      border-radius: 16px;
      width: 400px;
      max-width: 90vw;
    }
    .login-card .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 6px;
    }
    .login-card p {
      color: #71717a;
      font-size: 14px;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f10;
      border: 1px solid #27272a;
      border-radius: 10px;
      font-size: 14px;
      color: #fafafa;
      margin-bottom: 24px;
      transition: border-color .2s;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    input::placeholder { color: #3f3f46; }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: 0.9; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #86efac;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">A</div>
    <h1>Analytics Dashboard</h1>
    <p>Enter your password to continue</p>
    <form method="POST" action="/dashboard/login">
      <div id="logout-msg" class="success" style="display:none">You have been logged out successfully.</div>
      <div id="error-msg" class="error" style="display:none">Incorrect password. Please try again.</div>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required autofocus>
      <button type="submit">Sign in</button>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('error-msg').style.display = 'block';
    }
    if (location.search.includes('logout=1')) {
      document.getElementById('logout-msg').style.display = 'block';
    }
  </script>
</body>
</html>
