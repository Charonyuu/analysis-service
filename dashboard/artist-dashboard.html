<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #0f0f10;
      color: #e4e4e7;
      min-height: 100vh;
      font-size: 14px;
    }

    /* --- Sidebar --- */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 240px; height: 100vh;
      background: #18181b; border-right: 1px solid #27272a;
      padding: 24px 16px;
      display: flex; flex-direction: column;
      z-index: 10; overflow-y: auto;
    }
    .sidebar .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px; padding: 0 8px;
    }
    .sidebar .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: #fff;
    }
    .sidebar .brand span { font-size: 15px; font-weight: 600; color: #fafafa; }
    .sidebar nav { flex: 1; }
    .nav-label {
      font-size: 11px; font-weight: 600; color: #52525b;
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 0 12px; margin-bottom: 6px; margin-top: 20px;
    }
    .nav-label:first-child { margin-top: 0; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: #a1a1aa; text-decoration: none;
      font-size: 14px; font-weight: 500;
      transition: all .15s; margin-bottom: 2px; cursor: pointer;
    }
    .sidebar nav a:hover { background: #27272a; color: #fafafa; }
    .sidebar nav a.active { background: rgba(99,102,241,0.12); color: #818cf8; }
    .sidebar nav a svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer { border-top: 1px solid #27272a; padding-top: 16px; }
    .sidebar-footer a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: #71717a; text-decoration: none; font-size: 13px; transition: all .15s;
    }
    .sidebar-footer a:hover { color: #fca5a5; background: rgba(239,68,68,0.08); }
    .sidebar-footer a svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-user {
      padding: 10px 12px; margin-bottom: 8px;
      font-size: 13px; color: #71717a;
    }
    .sidebar-user .name { color: #e4e4e7; font-weight: 600; }

    /* --- Main --- */
    .main { margin-left: 240px; padding: 32px 40px; min-height: 100vh; }

    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px; gap: 16px;
    }
    .page-header h1 { font-size: 22px; font-weight: 600; color: #fafafa; }
    .page-header .subtitle { font-size: 13px; color: #71717a; margin-top: 4px; }

    /* --- Views --- */
    .view { display: none; }
    .view.active { display: block; }

    /* --- Upload Zone --- */
    .upload-zone {
      border: 2px dashed #3f3f46;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 24px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #6366f1;
      background: rgba(99,102,241,0.05);
    }
    .upload-zone svg { width: 48px; height: 48px; color: #52525b; margin-bottom: 12px; }
    .upload-zone p { color: #71717a; font-size: 14px; }
    .upload-zone .hint { font-size: 12px; color: #52525b; margin-top: 6px; }
    .upload-zone input { display: none; }

    /* --- Upload options --- */
    .upload-options {
      display: flex; gap: 12px; margin-bottom: 24px; align-items: center;
    }
    .upload-options label { font-size: 13px; color: #a1a1aa; font-weight: 500; }
    .upload-options select {
      padding: 8px 14px; background: #18181b;
      border: 1px solid #27272a; border-radius: 8px;
      font-size: 14px; color: #e4e4e7; cursor: pointer;
    }
    .upload-options select:focus { outline: none; border-color: #6366f1; }

    /* --- Asset Grid --- */
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .asset-card {
      background: #18181b; border: 1px solid #27272a;
      border-radius: 10px; padding: 12px;
      transition: border-color .2s;
    }
    .asset-card:hover { border-color: #3f3f46; }
    .asset-card img {
      width: 100%; aspect-ratio: 1;
      object-fit: contain; border-radius: 6px;
      background: #0f0f10; margin-bottom: 8px;
    }
    .asset-card .name {
      font-size: 12px; color: #a1a1aa;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .asset-card .meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 6px;
    }
    .asset-card .type-tag {
      font-size: 11px; color: #71717a;
      background: #27272a; padding: 2px 8px; border-radius: 4px;
    }

    /* --- Badge --- */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    }
    .badge-staging { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .badge-approved { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-rejected { background: rgba(239,68,68,0.15); color: #fca5a5; }

    /* --- Stats placeholder --- */
    .placeholder-card {
      background: #18181b; border: 1px solid #27272a;
      border-radius: 12px; padding: 48px;
      text-align: center; color: #52525b;
    }

    /* --- Section header --- */
    .section-header {
      font-size: 16px; font-weight: 600; color: #fafafa;
      margin-bottom: 16px;
    }

    /* --- Upload progress --- */
    .upload-status {
      padding: 12px 16px; border-radius: 8px;
      margin-bottom: 16px; font-size: 13px; display: none;
    }
    .upload-status.success {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac;
    }
    .upload-status.error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5;
    }

    .empty-state {
      color: #52525b; text-align: center; padding: 40px;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px; }
      .asset-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">A</div>
      <span>Analytics</span>
    </div>
    <nav>
      <div class="nav-label">Studio</div>
      <a href="#" class="nav-link active" data-view="assets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        My Assets
      </a>
      <a href="/dashboard/artist-guide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
        Asset Guide
      </a>
      <a href="#" class="nav-link" data-view="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        My Stats
      </a>
    </nav>
    <div class="sidebar-user" id="sidebar-user"></div>
    <div class="sidebar-footer">
      <a href="/dashboard/logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="page-header">
      <div>
        <h1 id="page-title">My Assets</h1>
        <div class="subtitle" id="page-subtitle">Upload and manage your assets</div>
      </div>
    </div>

    <!-- Assets View -->
    <div class="view active" id="view-assets">
      <div class="upload-status" id="upload-status"></div>

      <div class="upload-options">
        <label for="asset-type">Type:</label>
        <select id="asset-type">
          <option value="sticker">Sticker</option>
          <option value="background">Background</option>
          <option value="diy">DIY</option>
        </select>
      </div>

      <div class="upload-zone" id="upload-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drag & drop PNG files here, or click to select</p>
        <div class="hint">Supports PNG, max 10MB</div>
        <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" multiple>
      </div>

      <h3 class="section-header">Uploaded Assets</h3>
      <div class="asset-grid" id="asset-grid"></div>
      <div class="empty-state" id="empty-assets" style="display:none">No assets uploaded yet</div>
    </div>

    <!-- Stats View -->
    <div class="view" id="view-stats">
      <div class="placeholder-card" id="stats-placeholder">
        No data available yet
      </div>
    </div>
  </div>

  <script src="/dashboard/artist-dashboard.js"></script>
</body>
</html>
