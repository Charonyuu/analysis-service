<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; }
    .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e8e8e8; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .header-right select, .header-right a { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; text-decoration: none; color: #333; }
    .header-right a:hover { background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
    .stat-card .values { display: flex; flex-direction: column; gap: 4px; }
    .stat-card .site-val { font-size: 14px; display: flex; justify-content: space-between; }
    .stat-card .site-val .num { font-weight: 700; font-size: 18px; }
    .travel-color { color: #4f86f7; }
    .icons-color { color: #2ec27e; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
    .badge-travel { background: #4f86f7; }
    .badge-icons { background: #2ec27e; }
    .badge-pageview { background: #888; }
    .badge-event { background: #e67e22; }
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .chart-card h3 { font-size: 15px; margin-bottom: 12px; }
    .full-width { grid-column: 1 / -1; }
    .recent-list { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .recent-list h3 { font-size: 15px; margin-bottom: 12px; }
    .recent-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; display: flex; gap: 8px; align-items: center; }
    .recent-item:last-child { border-bottom: none; }
    .recent-time { color: #999; min-width: 80px; }
    canvas { max-height: 300px; }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .charts-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Analytics Dashboard</h1>
    <div class="header-right">
      <select id="site-filter">
        <option value="all">All Sites</option>
        <option value="travel">Travel</option>
        <option value="icons">Icons</option>
      </select>
      <select id="time-range">
        <option value="7">Last 7 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
      <a href="/dashboard/logout">Logout</a>
    </div>
  </div>
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Today Pageviews</div>
        <div class="values">
          <div class="site-val"><span class="travel-color">Travel</span> <span class="num" id="today-travel">0</span></div>
          <div class="site-val"><span class="icons-color">Icons</span> <span class="num" id="today-icons">0</span></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">Week Pageviews</div>
        <div class="values">
          <div class="site-val"><span class="travel-color">Travel</span> <span class="num" id="week-travel">0</span></div>
          <div class="site-val"><span class="icons-color">Icons</span> <span class="num" id="week-icons">0</span></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">Total Pageviews</div>
        <div class="values">
          <div class="site-val"><span class="travel-color">Travel</span> <span class="num" id="total-travel">0</span></div>
          <div class="site-val"><span class="icons-color">Icons</span> <span class="num" id="total-icons">0</span></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">Unique Sessions</div>
        <div class="values">
          <div class="site-val"><span class="travel-color">Travel</span> <span class="num" id="sessions-travel">0</span></div>
          <div class="site-val"><span class="icons-color">Icons</span> <span class="num" id="sessions-icons">0</span></div>
        </div>
      </div>
    </div>
    <div class="chart-card full-width" style="margin-bottom:24px">
      <h3>Daily Pageview Trend</h3>
      <canvas id="dailyChart"></canvas>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <h3>Top 10 Pages</h3>
        <canvas id="topPagesChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Top 10 Events</h3>
        <canvas id="topEventsChart"></canvas>
      </div>
    </div>
    <div class="recent-list">
      <h3>Recent Activity (last 50)</h3>
      <div id="recent-items"></div>
    </div>
  </div>
  <script src="/dashboard/app.js"></script>
</body>
</html>
